name: otel-e2e

# End-to-end verification of the OTLP log export (pkg/otlp).
#
# Job "local" (free, no secrets, runs on PRs touching the export path):
#   runs the official OpenTelemetry Collector on the runner with a file
#   exporter, points cargowall at http://127.0.0.1:4318, generates allowed
#   and denied traffic, then asserts the decoded log records carry the
#   expected event names, attributes, and resource identity.
#
# Job "grafana-cloud" (manual only): same flow, but exports to the real
# Grafana Cloud OTLP gateway and verifies arrival by querying Loki through
# the codecargo.grafana.net API. Requires repository secrets:
#   GRAFANA_CLOUD_OTLP_ENDPOINT  e.g. https://otlp-gateway-<region>.grafana.net/otlp
#   GRAFANA_CLOUD_OTLP_HEADERS   e.g. Authorization=Basic%20<base64(instanceId:token)>
#   GRAFANA_E2E_SA_TOKEN         service-account token (Viewer) on codecargo.grafana.net
#
# NOTE: unlike the other workflows, these jobs must NOT start with
# code-cargo/cargowall-action — the job runs its own cargowall instance and
# two instances would fight over the TC hook and DNS redirect.

on:
  pull_request:
    branches: [main]
    paths:
      - "pkg/otlp/**"
      - "pkg/events/**"
      - "pb/otlp/**"
      - "cmd/start.go"
      - ".github/workflows/otel-e2e.yml"
  workflow_dispatch:
    inputs:
      grafana-cloud:
        description: "Also export to the real Grafana Cloud OTLP gateway and verify via Loki"
        type: boolean
        default: false

concurrency:
  group: otel-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  local:
    name: Local collector round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build cargowall
        run: make build

      - name: Start OpenTelemetry Collector (file exporter)
        run: |
          mkdir -p /tmp/otelcol/out
          chmod -R 777 /tmp/otelcol
          cat > /tmp/otelcol/config.yaml <<'EOF'
          receivers:
            otlp:
              protocols:
                http:
                  endpoint: 0.0.0.0:4318
          exporters:
            file:
              path: /out/records.json
          service:
            pipelines:
              logs:
                receivers: [otlp]
                exporters: [file]
          EOF
          docker run -d --name otelcol \
            -p 4318:4318 \
            -v /tmp/otelcol/config.yaml:/etc/otelcol/config.yaml:ro \
            -v /tmp/otelcol/out:/out \
            otel/opentelemetry-collector:0.156.0 \
            --config /etc/otelcol/config.yaml
          # Wait until the OTLP receiver accepts connections
          for i in $(seq 1 30); do
            curl -sf -o /dev/null -X POST http://127.0.0.1:4318/v1/logs \
              -H 'Content-Type: application/x-protobuf' --data-binary '' && break
            sleep 1
          done

      - name: Write firewall policy
        run: |
          sudo mkdir -p /etc/cargowall
          sudo tee /etc/cargowall/config.json > /dev/null <<'EOF'
          {
            "defaultAction": "deny",
            "rules": [
              {"type":"hostname","value":"github.com","ports":[{"port":443,"protocol":"tcp"}],"action":"allow"},
              {"type":"cidr","value":"8.8.8.8/32","ports":[{"port":53,"protocol":"udp"}],"action":"allow"}
            ]
          }
          EOF

      - name: Start cargowall with OTLP export
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:4318
          OTEL_EXPORTER_OTLP_COMPRESSION: gzip
          OTEL_SERVICE_NAME: cargowall-e2e
          OTEL_RESOURCE_ATTRIBUTES: test.run.id=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          # Audit mode: events are exported with would_deny verdicts but no
          # traffic is actually blocked, so runner infrastructure (results
          # upload, Azure metadata, ...) cannot break. The collector endpoint
          # is loopback, which the TC egress filter never sees.
          sudo -E ./bin/cargowall start \
            --config /etc/cargowall/config.json \
            --dns-upstream 8.8.8.8:53 \
            --dns-redirect-iptables \
            --dns-query-filtering \
            --audit-mode \
            --audit-log /tmp/cargowall.ndjson \
            --pidfile /tmp/cargowall.pid &
          ./bin/cargowall wait-ready --timeout 30s

      - name: Generate allowed and denied traffic
        run: |
          # First connection to a fresh IP is typically relabeled
          # connection_late_allowed (SYN races the DNS-driven map add); the
          # second lands as a plain connection_allowed.
          curl -sS -o /dev/null https://github.com
          sleep 1
          curl -sS -o /dev/null https://github.com
          # example.com is not in policy: DNS filtering flags it (dns_blocked)
          # and the connection is recorded would_deny; audit mode lets it pass.
          curl -sS -o /dev/null https://example.com || true

      - name: Stop cargowall (flushes exporter)
        run: |
          sudo ./bin/cargowall stop --pidfile /tmp/cargowall.pid
          sleep 2

      - name: Verify exported records
        run: |
          out=/tmp/otelcol/out/records.json
          test -s "$out" || { echo "::error::collector received no data"; exit 1; }

          # Flatten every LogRecord across all export requests.
          jq -s '[ .[].resourceLogs[]?.scopeLogs[]?.logRecords[]? ]' "$out" > /tmp/records-flat.json
          total=$(jq 'length' /tmp/records-flat.json)
          echo "collector received $total log records"

          jqdef='def attr($k): [.attributes[]? | select(.key==$k) | .value.stringValue] | first;'

          # 1. github.com connections exported with verdict allow — the first
          # is legitimately connection_late_allowed (SYN vs map-add race),
          # so accept both allow-outcome event names.
          jq -e "$jqdef"'[ .[] | select(
              (.eventName=="cargowall.connection_allowed" or .eventName=="cargowall.connection_late_allowed")
              and attr("server.address")=="github.com"
              and attr("cargowall.verdict")=="allow") ] | length > 0' \
            /tmp/records-flat.json > /dev/null \
            || { echo "::error::no allow-verdict record for github.com"; exit 1; }

          # 2. example.com DNS block exported with verdict would_deny (audit mode).
          jq -e "$jqdef"'[ .[] | select(.eventName=="cargowall.dns_blocked"
              and attr("server.address")=="example.com"
              and attr("cargowall.verdict")=="would_deny") ] | length > 0' \
            /tmp/records-flat.json > /dev/null \
            || { echo "::error::no dns_blocked record for example.com"; exit 1; }

          # 3. Resource identity: service.name + the per-run marker attribute.
          jq -e -s --arg runid "${{ github.run_id }}-${{ github.run_attempt }}" \
            '[ .[].resourceLogs[]?.resource.attributes[]?
               | select((.key=="service.name" and .value.stringValue=="cargowall-e2e")
                     or (.key=="test.run.id" and .value.stringValue==$runid)) ]
             | length >= 2' "$out" > /dev/null \
            || { echo "::error::resource attributes missing service.name/test.run.id"; exit 1; }

          echo "all OTLP export assertions passed"

      - name: Upload collector output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: otel-e2e-local-output
          path: |
            /tmp/otelcol/out/records.json
            /tmp/cargowall.ndjson
          if-no-files-found: ignore

      - name: Cleanup collector
        if: always()
        run: docker rm -f otelcol || true

  grafana-cloud:
    name: Grafana Cloud gateway round-trip
    # Manual opt-in only: exports test data to the real codecargo.grafana.net
    # stack and consumes ingest quota. Secrets are never exposed to
    # pull_request runs.
    if: github.event_name == 'workflow_dispatch' && inputs.grafana-cloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check secrets are configured
        env:
          OTLP_ENDPOINT: ${{ secrets.GRAFANA_CLOUD_OTLP_ENDPOINT }}
          SA_TOKEN: ${{ secrets.GRAFANA_E2E_SA_TOKEN }}
        run: |
          if [ -z "$OTLP_ENDPOINT" ] || [ -z "$SA_TOKEN" ]; then
            echo "::error::GRAFANA_CLOUD_OTLP_ENDPOINT / GRAFANA_CLOUD_OTLP_HEADERS / GRAFANA_E2E_SA_TOKEN secrets are not configured"
            exit 1
          fi

      - name: Build cargowall
        run: make build

      - name: Write firewall policy
        run: |
          sudo mkdir -p /etc/cargowall
          # The OTLP gateway host must be allowed by policy (deny-by-default
          # would block the exporter's own egress) — but this job runs in
          # audit mode, so the wildcard allow below is belt-and-braces
          # documentation of the real-world requirement.
          sudo tee /etc/cargowall/config.json > /dev/null <<'EOF'
          {
            "defaultAction": "deny",
            "rules": [
              {"type":"hostname","value":"github.com","ports":[{"port":443,"protocol":"tcp"}],"action":"allow"},
              {"type":"hostname","value":"*.grafana.net","ports":[{"port":443,"protocol":"tcp"}],"action":"allow"},
              {"type":"cidr","value":"8.8.8.8/32","ports":[{"port":53,"protocol":"udp"}],"action":"allow"}
            ]
          }
          EOF

      - name: Start cargowall exporting to Grafana Cloud
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.GRAFANA_CLOUD_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.GRAFANA_CLOUD_OTLP_HEADERS }}
          OTEL_EXPORTER_OTLP_COMPRESSION: gzip
          OTEL_SERVICE_NAME: cargowall-e2e
          OTEL_RESOURCE_ATTRIBUTES: test.run.id=${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          sudo -E ./bin/cargowall start \
            --config /etc/cargowall/config.json \
            --dns-upstream 8.8.8.8:53 \
            --dns-redirect-iptables \
            --dns-query-filtering \
            --audit-mode \
            --pidfile /tmp/cargowall.pid &
          ./bin/cargowall wait-ready --timeout 30s

      - name: Generate allowed and denied traffic
        run: |
          curl -sS -o /dev/null https://github.com
          curl -sS -o /dev/null https://example.com || true

      - name: Stop cargowall (flushes exporter)
        run: sudo ./bin/cargowall stop --pidfile /tmp/cargowall.pid

      - name: Verify records arrived in Loki
        env:
          SA_TOKEN: ${{ secrets.GRAFANA_E2E_SA_TOKEN }}
          RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          # Grafana Cloud promotes service.name to the service_name label;
          # resource attributes (test.run.id) land in structured metadata,
          # which the query response includes. Poll to ride out ingestion lag.
          query() {
            curl -sf https://codecargo.grafana.net/api/ds/query \
              -H "Authorization: Bearer $SA_TOKEN" \
              -H 'Content-Type: application/json' \
              -d '{
                "from": "now-30m", "to": "now",
                "queries": [{
                  "refId": "A",
                  "datasource": {"uid": "grafanacloud-logs", "type": "loki"},
                  "expr": "{service_name=\"cargowall-e2e\"}",
                  "queryType": "range",
                  "maxLines": 200
                }]
              }'
          }
          for i in $(seq 1 12); do
            if query | grep -q "$RUN_ID"; then
              echo "records for run $RUN_ID found in Loki"
              exit 0
            fi
            echo "attempt $i: not visible yet, waiting 15s"
            sleep 15
          done
          echo "::error::no records with test.run.id=$RUN_ID visible in Loki after 3 minutes"
          exit 1
