name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
      ref:
        description: "Source ref to build from - commit SHA, branch, or tag (defaults to main)"
        required: false
        type: string
jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: code-cargo/cargowall-action@v1.0.1

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install eBPF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev

      - name: Generate BPF objects
        run: go generate ./...

      - name: Determine version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: CI_VERSION="${{ steps.tag.outputs.version }}" GOARCH="${{ matrix.arch }}" make build

      - name: Rename binary
        run: mv bin/cargowall "bin/cargowall-linux-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cargowall-linux-${{ matrix.arch }}
          path: bin/cargowall-linux-${{ matrix.arch }}

  release:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      id-token: write
      attestations: write
    steps:
      - uses: code-cargo/cargowall-action@v1.0.1

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: artifacts/cargowall-linux-*

      - name: Create checksums
        working-directory: artifacts
        run: sha256sum cargowall-linux-* > checksums.txt

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARGET="${{ inputs.ref || github.sha }}"
          gh release create "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --target "$TARGET" \
            --generate-notes \
            --prerelease \
            --draft

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.tag.outputs.tag }}" artifacts/* --repo "${{ github.repository }}"
