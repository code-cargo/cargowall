syntax = "proto3";

import "data/cargo_wall_mode_enum.proto";
import "data/cargo_wall_action_type_enum.proto";
import "data/cargo_wall_rule_type_enum.proto";

option csharp_namespace = "Controller.ApiService.Pb.CargoWall.V1";
option go_package = "github.com/code-cargo/cargowall/pb/cargowall/v1";

package grpc.cargowall.v1;

message CargoWallPolicy {
  CargoWallMode mode = 1;
  CargoWallActionType default_action = 2;
  repeated Rule rules = 3;

  message Rule {
    CargoWallRuleType type = 1;
    string value = 2;
    CargoWallActionType action = 3;
    repeated uint32 ports = 4;
  }
}
